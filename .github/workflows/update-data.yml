name: Dashboard Verisini Güncelle

on:
  push:
    paths:
      - '*.xlsx'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gerekli paketi kur
        run: pip install openpyxl

      - name: Veriyi HTML içine işle
        run: python scripts/rebuild_data.py

      - name: Değişikliği geri gönder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet --cached || git commit -m "Otomatik veri güncelleme"
          git push
          
