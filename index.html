<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>İnternet Depo Verimlilik Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f6fa;--sur:#ffffff;--card:#ffffff;--card2:#f7f8fc;
  --bdr:#d4d9e3;--bdr2:#b8c0d0;
  --blue:#1d4ed8;--green:#047857;--red:#b91c1c;--amber:#b45309;--purple:#6d28d9;
  --text:#020617;--sub:#1e293b;--muted:#475569;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px}
.layout{display:grid;grid-template-columns:222px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:#f8faff;border-right:1px solid var(--bdr);position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.logo{padding:18px 16px 14px;border-bottom:1px solid var(--bdr)}
.logo-eye{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:4px}
.logo-name{font-size:16px;font-weight:700;letter-spacing:-.02em;color:var(--text)}
.logo-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* UPLOAD BUTONU - sidebar alt */
.upload-zone{margin:auto 12px 12px;border:1.5px dashed var(--bdr2);border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:.2s;background:#fff}
.upload-zone:hover{border-color:var(--blue);background:#eff6ff}
.upload-zone.drag{border-color:var(--blue);background:#eff6ff;transform:scale(1.02)}
.upload-icon{font-size:22px;margin-bottom:6px}
.upload-title{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:2px}
.upload-sub{font-size:11px;color:var(--muted)}
.upload-badge{display:inline-block;margin-top:6px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:#dcfce7;color:#166534}
#fileInput{display:none}

.nav-grp{padding:12px 0 4px}
.nav-lbl{padding:0 16px 5px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:13.5px;color:var(--sub);border-left:2.5px solid transparent;transition:.12s;user-select:none}
.nav-item:hover{background:rgba(37,99,235,.06);color:var(--text)}
.nav-item.active{background:rgba(37,99,235,.1);font-weight:700}
.nav-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.nav-pct{margin-left:auto;font-size:11px;font-family:'IBM Plex Mono',monospace;font-weight:600;flex-shrink:0}

/* MAIN */
.main{display:flex;flex-direction:column;position:relative;overflow:hidden}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid var(--bdr);padding:11px 22px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.topbar-title{font-size:19px;font-weight:700;letter-spacing:-.02em}
.upd-lbl{font-size:11px;color:var(--muted);margin-left:4px}
.filters{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-left:auto}
.fgroup{display:flex;gap:2px;background:#f1f4fb;border:1px solid var(--bdr);border-radius:8px;padding:3px}
.fbtn{padding:6px 13px;border-radius:6px;border:none;background:transparent;cursor:pointer;font-size:12.5px;color:var(--sub);font-family:'Inter',sans-serif;transition:.12s;white-space:nowrap;font-weight:700}
.fbtn:hover{color:var(--text);background:rgba(0,0,0,.04)}
.fbtn.on{background:var(--blue);color:#fff;font-weight:600}
.fbtn.on.g{background:var(--green);color:#fff}
.fbtn.on.b{background:#6366f1;color:#fff}
.fbtn.on.q{background:var(--amber);color:#fff}
.fsep{width:1px;background:var(--bdr);align-self:stretch;margin:0 3px}

/* CONTENT */
.content{padding:18px 22px;flex:1;overflow-y:auto}

/* LOADING OVERLAY */
.overlay{position:absolute;inset:0;background:rgba(240,242,247,.92);display:flex;align-items:center;justify-content:center;z-index:40;transition:.2s}
.overlay.hidden{display:none}
.spin{width:32px;height:32px;border:3px solid var(--bdr);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SUMMARY */
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.scard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:13px 15px;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.scard-lbl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:8px}
.scard-val{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;line-height:1.1}
.scard-sub{font-size:12.5px;color:var(--sub);margin-top:4px;font-weight:700}
.badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px;font-family:'IBM Plex Mono',monospace}
.badge.up{background:rgba(5,150,105,.1);color:var(--green)}
.badge.dn{background:rgba(220,38,38,.1);color:var(--red)}
.chgc-pct.up{color:var(--green)}
.chgc-pct.dn{color:var(--red)}
.chgc-pct.neu{color:var(--muted)}
.badge.neu{background:rgba(148,163,184,.1);color:var(--sub)}

/* CHG STRIP */
.chgstrip{display:grid;grid-template-columns:repeat(9,1fr);gap:5px;margin-bottom:14px}
.chgc{background:var(--card);border:1px solid var(--bdr);border-radius:7px;padding:8px 9px;border-top-width:2px;cursor:pointer;transition:.12s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.chgc:hover,.chgc.active{background:var(--card2);border-color:var(--bdr2)}
.chgc-name{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chgc-vals{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--text);font-weight:700}
.chgc-pct{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:700;margin-top:3px}

/* Q PANEL */
.qpanel{display:none;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.qpanel.visible{display:grid}
.qcard{background:#f8faff;border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.qcard-head{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.qcard-badge{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:14px;background:var(--amber);color:#fff}
.qcard-months{font-size:11.5px;color:var(--sub);font-weight:700}
.qcard-vals{display:flex;gap:10px;margin-top:6px}
.qv{text-align:center}
.qv-yr{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-bottom:2px}
.qv-val{font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600}

/* HAFTA BAR */
.hbar{display:none;gap:5px;flex-wrap:wrap;margin-bottom:12px;align-items:center;padding:9px 13px;background:#f8faff;border:1px solid var(--bdr);border-radius:8px}
.hbar.visible{display:flex}
.hbar-lbl{font-size:11px;color:var(--sub);font-weight:700;white-space:nowrap}
.hbtn{padding:3px 10px;border-radius:14px;border:1px solid var(--bdr);background:#fff;cursor:pointer;font-size:10px;color:var(--sub);font-family:'Inter',sans-serif;transition:.1s}
.hbtn:hover{border-color:var(--blue);color:var(--text)}
.hbtn.on{background:var(--blue);border-color:var(--blue);color:#fff;font-weight:600}
.hrange-lbl{font-size:11px;color:var(--sub);font-family:'IBM Plex Mono',monospace;min-width:130px}
input[type=range]{accent-color:var(--blue)}

/* CHARTS */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cc{background:var(--card);border:1px solid var(--bdr);border-radius:10px;padding:15px 17px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.cc.full{grid-column:1/-1}
.cc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px}
.export-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--bdr2);background:#f0fdf4;color:#047857;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;transition:.12s}
.export-btn:hover{background:#dcfce7;border-color:#047857}
.cc-title{font-size:14.5px;font-weight:700}
.cc-sub{font-size:12px;color:var(--muted);margin-top:2px;font-weight:700}
.leg{display:flex;gap:12px;font-size:12px;color:var(--sub);flex-wrap:wrap;align-items:center;font-weight:600}
.lsq{width:8px;height:8px;border-radius:2px;display:inline-block;margin-right:3px;vertical-align:middle}
.cwrap{position:relative;width:100%}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
</style>
</head>
<body>
<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-eye">Verimlilik</div>
      <div class="logo-name">İnternet Depo</div>
      <div class="logo-sub">2025 – 2026 Dashboard</div>
    </div>
    <div id="navItems"></div>

    <!-- UPLOAD ZONE -->
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
      <div class="upload-icon">📂</div>
      <div class="upload-title">Excel Güncelle</div>
      <div class="upload-sub">Dosyayı sürükle veya tıkla</div>
      <div class="upload-badge" id="uploadBadge">Güncel veri yüklü</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(this.files[0])">
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="pageTitle">Genel</div>
      <div class="fgroup" style="margin-left:4px"><button class="fbtn lang-btn on" data-lang="tr" onclick="setLang('tr')">TR</button><button class="fbtn lang-btn" data-lang="en" onclick="setLang('en')">EN</button></div>
      <div class="upd-lbl" id="lastUpdate"></div>
      <div class="filters">
        <div class="fgroup" id="fgYil"></div>
        <div class="fsep"></div>
        <div class="fgroup" id="fgPer">
          <button class="fbtn on" id="btn-aylik" onclick="setPer('aylik',this)">Aylık</button>
          <button class="fbtn"    id="btn-haftalik" onclick="setPer('haftalik',this)">Haftalık</button>
          <button class="fbtn"    id="btn-gunluk" onclick="setPer('gunluk',this)">Günlük</button>
        </div>
        <div class="fsep"></div>
        <div class="fgroup" id="fgQkr">
          <button class="fbtn on" id="btn-tumu" onclick="setQkr(null,this)">Tümü</button>
          <button class="fbtn q"  onclick="setQkr('Q1',this)">Q1</button>
          <button class="fbtn q"  onclick="setQkr('Q2',this)">Q2</button>
          <button class="fbtn q"  onclick="setQkr('Q3',this)">Q3</button>
          <button class="fbtn q"  onclick="setQkr('Q4',this)">Q4</button>
        </div>
      </div>
    </div>

    <!-- OVERLAY -->
    <div class="overlay hidden" id="overlay">
      <div><div class="spin"></div><div style="font-size:12px;color:var(--sub);text-align:center">Veriler işleniyor...</div></div>
    </div>

    <div class="content">
      <div class="sbar"     id="sBar"></div>
      <div class="chgstrip" id="chgStrip"></div>
      <div class="qpanel"   id="qPanel"></div>
      <div class="hbar"     id="hftBar"></div>
      <div class="hbar"     id="gunBar"></div>
      <div class="cgrid"    id="chartGrid"></div>
    </div>
  </div>
</div>

async function handleFile(file) {
  if(!file) return;
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  const badge = document.getElementById('uploadBadge');
  badge.textContent = 'Okunuyor...';
  badge.style.background = '#fef3c7';
  badge.style.color = '#92400e';

  await new Promise(r=>setTimeout(r,50));

  // Yerel tarih bileşenlerinden YYYY-MM-DD üret (UTC kaymasını önler)
  function localYmd(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return y + '-' + m + '-' + day;
  }

  try {
    const buf  = await file.arrayBuffer();
    const wb   = XLSX.read(buf, {type:'array', cellDates:true});
    const newData = {};

    for(const sName of SHEET_NAMES) {
      if(!wb.Sheets[sName]) continue;
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sName], {header:1, defval:null});

      // Yıl bloklarını otomatik algıla
      const blocks = [];
      for(let i=0; i<rows.length; i++) {
        if(rows[i] && rows[i][1]==='Tarih') {
          const dates = rows[i].slice(2).map(v=>{
            if(!v) return null;
            const d = v instanceof Date ? v : new Date(v);
            if(isNaN(d)) return null;
            // SheetJS tarihleri UTC tabanlı üretir; yerel saat dilimi kaymasını
            // önlemek için UTC bileşenlerinden normalize edilmiş yerel tarih kuruyoruz
            return new Date(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate());
          }).filter(Boolean);
          if(dates.length) {
            const yearCounts = {};
            dates.forEach(d=>{ const y=d.getFullYear(); yearCounts[y]=(yearCounts[y]||0)+1; });
            // En çok tekrar eden yılı kullan (tek bir aykırı değer bloğu bozmasın)
            let majorityYear = dates[0].getFullYear();
            let maxCount = 0;
            for(const [y,c] of Object.entries(yearCounts)) {
              if(c > maxCount) { maxCount = c; majorityYear = parseInt(y); }
            }
            blocks.push({
              dateRow:i, haftaRow:i+1, saatRow:i+2, adetRow:i+3, year:majorityYear
            });
          }
        }
      }

      newData[sName] = {};
      for(const b of blocks) {
        const yr = b.year;
        const sfx = String(yr).slice(-2);
        const arr = [];

        for(let c=2; c<(rows[b.dateRow]||[]).length; c++) {
          const raw = rows[b.dateRow][c];
          if(!raw) continue;
          const dRaw = raw instanceof Date ? raw : new Date(raw);
          if(isNaN(dRaw.getTime())) continue;
          const d = new Date(dRaw.getUTCFullYear(), dRaw.getUTCMonth(), dRaw.getUTCDate());
          if(d.getFullYear()!==yr) continue;
          const saat = parseFloat(rows[b.saatRow]?.[c]);
          const adet = parseFloat(rows[b.adetRow]?.[c]);
          if(!saat||!adet||saat<=0||adet<=0) continue;
          const hafta = rows[b.haftaRow]?.[c]||'';
          const hno   = parseInt(String(hafta).replace(/\.? ?Hafta/i,'').trim());
          arr.push({
            ymd: localYmd(d),
            ay:  d.getMonth()+1,
            hno: isNaN(hno)?null:hno,
            saat, adet
          });
        }

        // Günlük
        const gun={};
        arr.forEach(r=>{ gun[r.ymd]={saat:Math.round(r.saat*100)/100, adet:Math.round(r.adet)}; });
        // Haftalık
        const hft={};
        arr.filter(r=>r.hno).forEach(r=>{
          const k=r.hno+'. Hafta';
          if(!hft[k]) hft[k]={saat:0,adet:0};
          hft[k].saat+=r.saat; hft[k].adet+=r.adet;
        });
        const hftSorted=Object.fromEntries(Object.entries(hft).sort((a,b)=>parseInt(a[0])-parseInt(b[0])));
        // Aylık
        const ay={};
        arr.forEach(r=>{
          const k=AY_ISIMLERI[r.ay-1];
          if(!ay[k]) ay[k]={saat:0,adet:0};
          ay[k].saat+=r.saat; ay[k].adet+=r.adet;
        });
        // Toplam (col 0)
        const ts = parseFloat(rows[b.saatRow]?.[0])||arr.reduce((s,r)=>s+r.saat,0);
        const ta = parseFloat(rows[b.adetRow]?.[0])||arr.reduce((s,r)=>s+r.adet,0);

        newData[sName][`gun${sfx}`] = gun;
        newData[sName][`hft${sfx}`] = hftSorted;
        newData[sName][`ay${sfx}`]  = ay;
        newData[sName][`tot${sfx}`] = {saat:Math.round(ts*100)/100, adet:Math.round(ta)};
      }
    }

    DATA = newData;
    LAST_UPDATE = new Date().toLocaleString('tr-TR');
    document.getElementById('lastUpdate').textContent = t('sonGuncelleme') + ': ' + LAST_UPDATE;

// ── HESAPLAMALAR ──
const verim=(a,s)=>s>0?+(a/s).toFixed(2):0;
const fmt=(v,d=1)=>v==null||v===0?'—':Number(v).toFixed(d);
const fmtP=v=>v==null?'—':(v>=0?'▲ +':'▼ ')+Math.abs(v).toFixed(1)+'%';
const pctVal=(a,b)=>a&&b?+((b-a)/a*100).toFixed(1):null;
const pCls=v=>v==null?'neu':v>=0?'up':'dn';
const pCol=v=>v==null?'var(--sub)':v>=0?'var(--green)':'var(--red)';

function getSfx(yr){ return String(yr).slice(-2); }

// Varsayılan "son 12 hafta" aralığı — GÜNCEL (en son) yıla göre hesaplanır ki
// her iki yıl da grafikte aynı hafta aralığında hizalı görünsün.
function defaultHftRange(){
  const yr1 = YILLAR[YILLAR.length-1];
  const src = DATA[curSheet]?.['hft'+getSfx(yr1)]||{};
  const nums = Object.keys(src).map(k=>parseInt(k)).filter(n=>!isNaN(n)).sort((a,b)=>a-b);
  const maxN = nums.length?Math.max(...nums):52;
  return {start:Math.max(1,maxN-11), end:maxN};
}

// Varsayılan "son 20 gün" aralığı — GÜNCEL yılın son 20 gününün ay-gün (MM-DD)
// penceresine göre hesaplanır ki her iki yıl da aynı takvim aralığında hizalı görünsün.
function defaultGunRange(){
  const yr1 = YILLAR[YILLAR.length-1];
  const src = DATA[curSheet]?.['gun'+getSfx(yr1)]||{};
  const keys = Object.keys(src).sort();
  const last20 = keys.slice(-20);
  if(!last20.length) return null;
  return {startMD:last20[0].slice(5), endMD:last20[last20.length-1].slice(5)};
}

// Q4 (Kasım-Aralık-Ocak) takvim yılını aşan tek çeyrektir: Ocak bir sonraki yıla aittir.
// Bu fonksiyon, çeyrek içindeki ay indeksine göre doğru yılın verisini döndürür.
function qMonthSource(s,yr,q,idx){
  const y = (q==='Q4' && idx===2) ? yr+1 : yr;
  return DATA[s]?.['ay'+getSfx(y)]||{};
}

function totalVerim(s,yr){
  if(curQkr) return monthlyVerim(s,yr,QKR_MAP[curQkr].monthsTR||QKR_MAP[curQkr].months,curQkr).verim;
  const t=DATA[s]?.['tot'+getSfx(yr)]||{adet:0,saat:0};
  return verim(t.adet,t.saat);
}
function totalAdetSaat(s,yr){
  if(curQkr){const r=monthlyVerim(s,yr,QKR_MAP[curQkr].monthsTR||QKR_MAP[curQkr].months,curQkr);return{adet:r.adet,saat:r.saat};}
  return DATA[s]?.['tot'+getSfx(yr)]||{adet:0,saat:0};
}
function monthlyVerim(s,yr,months,q){
  q = q||curQkr;
  const list = months||AY_SIRA;
  let ta=0,ts=0,doluAy=0;
  list.forEach((m,mi)=>{
    const src = q ? qMonthSource(s,yr,q,mi) : (DATA[s]?.['ay'+getSfx(yr)]||{});
    if(src[m]){ta+=src[m].adet;ts+=src[m].saat;doluAy++;}
  });
  return{verim:verim(ta,ts),adet:ta,saat:ts,doluAy,toplamAy:list.length};
}

function detectYears(){
  if(!SHEETS.length) return;
  const s=DATA[SHEETS[0]]||{};
  const sfxs=Object.keys(s).filter(k=>k.startsWith('tot')).map(k=>k.replace('tot',''));
  YILLAR=sfxs.map(x=>parseInt(x)<100?2000+parseInt(x):parseInt(x)).sort();
}

// ── VERİ ERİŞİM ──
function getData(s,yr){
  const sfx=getSfx(yr);
  const d=DATA[s]||{};
  if(curPer==='aylik'){
    const src=d['ay'+sfx]||{};
    const qkrMap = QKR_MAP;
    const displayMonths = curQkr ? qkrMap[curQkr].months : AY_SIRA;
    const datakeyMonths = curQkr ? (qkrMap[curQkr].monthsTR||qkrMap[curQkr].months) : (I18N[LANG].monthsTR||AY_SIRA);
    const vals = datakeyMonths.map((m,mi)=>{
      const msrc = curQkr ? qMonthSource(s,yr,curQkr,mi) : src;
      return msrc[m]||null;
    });
    return{labels:displayMonths, vals};
  }
  if(curPer==='haftalik'){
    const src=d['hft'+sfx]||{};
    const allK=Object.keys(src).sort((a,b)=>parseInt(a)-parseInt(b));
    const range = curHftRange||defaultHftRange();
    const keys=allK.filter(k=>{const n=parseInt(k);return n>=range.start&&n<=range.end;});
    const hftLabels = keys.map(k=>{
      const n = parseInt(k);
      return I18N[LANG].haftaLabel(n);
    });
    return{labels:hftLabels, dataKeys:keys, vals:keys.map(k=>src[k]||null)};
  }
  // günlük — son 20 gün VEYA seçili özel aralık
  const src=d['gun'+sfx]||{};
  const allKeys=Object.keys(src).sort();
  let keys;
  if(curGunRange){
    keys=allKeys.filter(k=>k>=curGunRange.start&&k<=curGunRange.end);
  } else {
    const def=defaultGunRange();
    if(def){
      keys=allKeys.filter(k=>{
        const md=k.slice(5);
        return def.startMD<=def.endMD ? (md>=def.startMD&&md<=def.endMD) : (md>=def.startMD||md<=def.endMD);
      });
    } else {
      keys=allKeys.slice(-20);
    }
  }
  return{labels:keys.map(k=>k.slice(5)), vals:keys.map(k=>src[k]||null), fullDates:keys};
}
function toVerimArr(vals){return vals.map(v=>v?verim(v.adet,v.saat):null);}

  } else if(curPer==='haftalik'){
    // Haftalık: dataKeys ile eşleştir, labels ile göster
    const dk0 = lv0.dataKeys||lv0.labels;
    const dk1 = lv1.dataKeys||lv1.labels;
    const allDK = [...new Set([...dk0,...dk1])].sort((a,b)=>parseInt(a)-parseInt(b));
    labels = allDK.map(k=>I18N[LANG].haftaLabel(parseInt(k)));
    v0arr = show25?allDK.map(k=>{const i=dk0.indexOf(k);return i>=0?lv0.vals[i]:null;}):null;
    v1arr = show26?allDK.map(k=>{const i=dk1.indexOf(k);return i>=0?lv1.vals[i]:null;}):null;
  } else {
    // Günlük
    labels = show25&&!show26?lv0.labels:show26&&!show25?lv1.labels:
      [...new Set([...lv0.labels,...lv1.labels])].sort();
    v0arr = show25?labels.map(l=>{const i=lv0.labels.indexOf(l);return i>=0?lv0.vals[i]:null;}):null;
    v1arr = show26?labels.map(l=>{const i=lv1.labels.indexOf(l);return i>=0?lv1.vals[i]:null;}):null;
  }
  const verim0=v0arr?toVerimArr(v0arr):null;
  const verim1=v1arr?toVerimArr(v1arr):null;
  const {mn,mx}=bounds([verim0??[],verim1??[]]);
  const perLbl=curPer==='aylik'?t('aylik'):curPer==='haftalik'?t('haftalik'):`${t('gunluk')} · ${t('sonGun')}`;
  const qLbl=curQkr?` · ${curQkr}`:'';

  // 1. ANA TREND
  const leg1=`${show25?`<span><span class="lsq" style="background:${col}"></span>${yr0}</span>`:''}${show25&&show26?' ':''}${show26?`<span><span class="lsq" style="background:var(--green)"></span>${yr1}</span>`:''}`;
  const c1=mkCard(SHEET_NAMES[SHEETS.indexOf(curSheet)]||curSheet,perLbl+qLbl,leg1,'260px','full','trend');
  grid.appendChild(c1);
  const ds1=[];
  if(show25&&verim0) ds1.push({label:String(yr0),data:verim0,borderColor:col,backgroundColor:col+'18',tension:.35,pointRadius:labels.length>25?1.5:2.5,borderWidth:2,fill:true,pointBackgroundColor:col});
  if(show26&&verim1) ds1.push({label:String(yr1),data:verim1,borderColor:'#059669',backgroundColor:'#05996918',tension:.35,pointRadius:labels.length>25?1.5:2.5,borderWidth:2,borderDash:[6,3],fill:false,pointBackgroundColor:'#059669'});
  charts.c1=new Chart(c1.querySelector('canvas'),{type:'line',data:{labels,datasets:ds1.map(ds=>curPer==='gunluk'?{...ds,spanGaps:true}:ds)},options:mkOpts(mn,mx,curPer==='gunluk'?labels.length:(labels.length>30?20:14))});

  CHART_EXPORTS['trend'] = {
    sheetName: curSheet,
    fileName: `${curSheet}_${perLbl.replace(' ','_')}.xlsx`,
    rows: [
      ['Dönem',
        ...(show25?[`${yr0} Verimlilik`,`${yr0} Adet`,`${yr0} Saat`]:[]),
        ...(show26?[`${yr1} Verimlilik`,`${yr1} Adet`,`${yr1} Saat`]:[])
      ],
      ...labels.map((l,i)=>[
        l,
        ...(show25?[verim0[i]??'', v0arr[i]?.adet??'', v0arr[i]?.saat??'']:[]),
        ...(show26?[verim1[i]??'', v1arr[i]?.adet??'', v1arr[i]?.saat??'']:[])
      ])
    ]
  };

  // 2. BAR — 12 AY (her ikisi + aylık)
  if(curYil==='tumu'&&curPer==='aylik'){
    const ay12TR = curQkr ? (QKR_MAP[curQkr].monthsTR||QKR_MAP[curQkr].months) : (I18N[LANG].monthsTR||AY_SIRA);
    const ay12 = curQkr ? QKR_MAP[curQkr].months : AY_SIRA;
    const bv0 = ay12TR.map((m,mi)=>{const src=curQkr?qMonthSource(curSheet,yr0,curQkr,mi):(DATA[curSheet]?.['ay'+getSfx(yr0)]||{});return src[m]?verim(src[m].adet,src[m].saat):null;});
    const bv1 = ay12TR.map((m,mi)=>{const src=curQkr?qMonthSource(curSheet,yr1,curQkr,mi):(DATA[curSheet]?.['ay'+getSfx(yr1)]||{});return src[m]?verim(src[m].adet,src[m].saat):null;});
    const b2=bounds([bv0,bv1]);
    const ayKisa=['Oca','Şub','Mar','Nis','May','Haz','Tem','Ağu','Eyl','Eki','Kas','Ara'];
    const ayLbls = curQkr ? QKR_MAP[curQkr].months.map(m=>m.slice(0,3)) : ayKisa;
    const c2=mkCard(t('aylikKarsilastirma'),`${yr0} vs ${yr1} ${t('aylik12')}`,
      `<span><span class="lsq" style="background:${col}"></span>${yr0}</span><span><span class="lsq" style="background:var(--green)"></span>${yr1}</span>`,'240px','full','barAylik');
    grid.appendChild(c2);
    charts.c2=new Chart(c2.querySelector('canvas'),{type:'bar',data:{labels:ayLbls,datasets:[
      {label:String(yr0),data:bv0,backgroundColor:col+'cc',borderRadius:4,barPercentage:.6},
      {label:String(yr1),data:bv1,backgroundColor:'#047857cc',borderRadius:4,barPercentage:.6}
    ]},options:{...mkOpts(b2.mn,b2.mx),scales:{...mkOpts(b2.mn,b2.mx).scales,
      x:{...mkOpts(b2.mn,b2.mx).scales.x,ticks:{color:'#000000',font:{size:10,weight:700},autoSkip:false,maxRotation:0}}}}});

    CHART_EXPORTS['barAylik'] = {
      sheetName: curSheet,
      fileName: `${curSheet}_Aylik_Karsilastirma.xlsx`,
      rows: [
        ['Ay', `${yr0} Verimlilik`,`${yr0} Adet`,`${yr0} Saat`, `${yr1} Verimlilik`,`${yr1} Adet`,`${yr1} Saat`],
        ...ay12.map((m,i)=>{
          const s0=curQkr?qMonthSource(curSheet,yr0,curQkr,i):(DATA[curSheet]?.['ay'+getSfx(yr0)]||{});
          const s1=curQkr?qMonthSource(curSheet,yr1,curQkr,i):(DATA[curSheet]?.['ay'+getSfx(yr1)]||{});
          return [
            ayLbls[i],
            bv0[i]??'', s0[ay12TR[i]]?.adet??'', s0[ay12TR[i]]?.saat??'',
            bv1[i]??'', s1[ay12TR[i]]?.adet??'', s1[ay12TR[i]]?.saat??''
          ];
        })
      ]
    };
  }

  // 3. TÜM BİRİMLER
  const allV0=SHEETS.map(s=>totalVerim(s,yr0));
  const allV1=SHEETS.map(s=>totalVerim(s,yr1));
  const b3=bounds([allV0,allV1]);
  const c3=mkCard(t('tumuBirimler'),perLbl+qLbl,
    `${show25?`<span><span class="lsq" style="background:#2563eb"></span>${yr0}</span>`:''}${show25&&show26?' ':''}${show26?`<span><span class="lsq" style="background:var(--green)"></span>${yr1}</span>`:''}`,
    '220px',curYil!=='tumu'?'full':'','tumBirimler');
  grid.appendChild(c3);
  const ds3=[];
  if(show25) ds3.push({label:String(yr0),data:allV0,backgroundColor:COLORS.map(c=>c+'bb'),borderColor:COLORS,borderWidth:1,borderRadius:4,barPercentage:.7});
  if(show26) ds3.push({label:String(yr1),data:allV1,backgroundColor:COLORS.map(c=>c+'44'),borderColor:COLORS,borderWidth:1.5,borderRadius:4,barPercentage:.7});
  charts.c3=new Chart(c3.querySelector('canvas'),{type:'bar',data:{labels:SHORT,datasets:ds3},
    options:{...mkOpts(b3.mn,b3.mx),scales:{...mkOpts(b3.mn,b3.mx).scales,x:{...mkOpts(b3.mn,b3.mx).scales.x,ticks:{color:'#000000',font:{size:9.5,weight:700},autoSkip:false,maxRotation:20}}}}});

  CHART_EXPORTS['tumBirimler'] = {
    sheetName: 'Tüm Birimler',
    fileName: `Tum_Birimler_${perLbl.replace(' ','_')}.xlsx`,
    rows: [
      ['Birim', `${yr0} Verimlilik`,`${yr0} Adet`,`${yr0} Saat`, `${yr1} Verimlilik`,`${yr1} Adet`,`${yr1} Saat`],
      ...SHEETS.map((s,i)=>{
        const as0=totalAdetSaat(s,yr0), as1=totalAdetSaat(s,yr1);
        return [s, allV0[i]??'', as0.adet??'', as0.saat??'', allV1[i]??'', as1.adet??'', as1.saat??''];
      })
    ]
  };

  // 4. DEĞİŞİM ORANI
  if(curYil==='tumu'){
    const pcts=SHEETS.map(s=>{const a=totalVerim(s,yr0),b=totalVerim(s,yr1);return a&&b?+((b-a)/a*100).toFixed(1):0;});
    const pmn=Math.floor(Math.min(...pcts)*1.3),pmx=Math.ceil(Math.max(...pcts)*1.3);
    const c4=mkCard(t('degisimOrani'),`% ${yr0} → ${yr1}${qLbl}`,'','220px',null,'degisimOrani');
    grid.appendChild(c4);
    charts.c4=new Chart(c4.querySelector('canvas'),{type:'bar',data:{labels:SHORT,datasets:[{
      label:'% Δ',data:pcts,
      backgroundColor:pcts.map(p=>p>=0?'#05996955':'#dc262655'),
      borderColor:pcts.map(p=>p>=0?'#059669':'#dc2626'),
      borderWidth:1.5,borderRadius:4
    }]},options:{...mkOpts(pmn,pmx),scales:{...mkOpts(pmn,pmx).scales,
      x:{...mkOpts(pmn,pmx).scales.x,ticks:{color:'#000000',font:{size:9.5,weight:700},autoSkip:false,maxRotation:20}},
      y:{...mkOpts(pmn,pmx).scales.y,ticks:{...mkOpts(pmn,pmx).scales.y.ticks,callback:v=>v+'%'}}}}});

    CHART_EXPORTS['degisimOrani'] = {
      sheetName: 'Degisim Orani',
      fileName: `Degisim_Orani_${yr0}_${yr1}.xlsx`,
      rows: [
        ['Birim', `${yr0} Verimlilik`,`${yr0} Adet`,`${yr0} Saat`, `${yr1} Verimlilik`,`${yr1} Adet`,`${yr1} Saat`, `% Değişim`],
        ...SHEETS.map((s,i)=>{
          const v0=totalVerim(s,yr0), v1=totalVerim(s,yr1);
          const as0=totalAdetSaat(s,yr0), as1=totalAdetSaat(s,yr1);
          return [s, v0??'', as0.adet??'', as0.saat??'', v1??'', as1.adet??'', as1.saat??'', pcts[i]];
        })
      ]
    };
  }
}

// ── STATE ──
function refreshAll(){buildYilBtns();buildNav();buildSummary();buildChgStrip();buildQPanel();buildHftBar();buildGunBar();buildCharts();}
function selectSheet(s){curSheet=s;const idx=SHEETS.indexOf(s);document.getElementById('pageTitle').textContent=SHEET_NAMES[idx>=0?idx:0]||s;refreshAll();}
function setYil(y,btn){curYil=y;document.querySelectorAll('#fgYil .fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');buildSummary();buildChgStrip();buildQPanel();buildCharts();}
function setPer(p,btn){curPer=p;curHftRange=null;curGunRange=null;document.querySelectorAll('#fgPer .fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');buildHftBar();buildGunBar();buildSummary();buildCharts();}
function setQkr(q,btn){curQkr=q;document.querySelectorAll('#fgQkr .fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');buildQPanel();buildSummary();buildChgStrip();buildCharts();}

// INIT
async function initApp(){
  document.getElementById('lastUpdate').textContent = 'Yükleniyor...';
  const ok = await loadDataJson();
  if(ok){
    document.getElementById('lastUpdate').textContent = LAST_UPDATE_DATA ? (t('sonGuncelleme') + ': ' + LAST_UPDATE_DATA) : '';
  } else {
    document.getElementById('lastUpdate').textContent = 'data.json bulunamadı — Excel yükleyin';
  }
  refreshAll();
}
initApp();
</script>
</body>
